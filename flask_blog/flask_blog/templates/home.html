{% extends "layout.html" %}
{% block content %}
    {% for post in posts %}
        <article class="media content-section">
          <!-- rounded-circle is a boostrap image, and artcile-img is a custom class in main.css. author is a backreference that gives us access to user's entire data an attributes -->
          <img class="rounded-circle article-img" src="{{ url_for ('static', filename='profile_pics/' + post.author.image_file)}}" >
          <div class="media-body">
            <div class="article-metadata">
              <a class="mr-2" href="#">{{ post.author.username }}</a>
              <small class="text-muted">{{ post.date_posted.strftime("%Y-%m-%d") }}</small>
              <!-- post.data_posted is a datetime object so we can use datetime methods here -->
            </div>
            <h2><a class="article-title" href="{{ url_for('post', post_id=post.id) }}">{{ post.title }}</a></h2>
            <p class="article-content">{{ post.content }}</p>
          </div>
        </article>
    {% endfor %}
{% endblock content %}
<!-- content isn't needed, but cleaner for readability -->
